server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Block common scanner/probe endpoints (no domain required).
  location = /.env { return 444; }
  location ^~ /.git { return 444; }
  location = /xmlrpc.php { return 444; }
  location = /wp-login.php { return 444; }
  location ^~ /wp-admin { return 444; }
  location ^~ /wp-content { return 444; }
  location ^~ /wp-includes { return 444; }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://monitor-server:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  location /ws {
    proxy_pass http://monitor-server:4000/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
