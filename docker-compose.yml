services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitor_center
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: monitor_pass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  monitor-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      PORT: 4000
      SESSION_SECRET: change-me-now
      DATABASE_URL: postgresql://monitor_user:monitor_pass@postgres:5432/monitor_center
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-2048}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-120000}
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      COOKIE_SECURE: "false"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ERROR_ALERTS_ENABLED: ${TELEGRAM_ERROR_ALERTS_ENABLED:-false}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_POLL_ENABLED: ${TELEGRAM_POLL_ENABLED:-true}
      TELEGRAM_POLL_INTERVAL_MS: ${TELEGRAM_POLL_INTERVAL_MS:-15000}
      TELEGRAM_DELETE_WEBHOOK_ON_START: ${TELEGRAM_DELETE_WEBHOOK_ON_START:-false}
      TELEGRAM_DAILY_REPORT_CRON: "${TELEGRAM_DAILY_REPORT_CRON:-0 22 * * *}"
      TELEGRAM_DAILY_REPORT_TIMEZONE: ${TELEGRAM_DAILY_REPORT_TIMEZONE:-Asia/Ho_Chi_Minh}
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres

  monitor-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8088:80"
    depends_on:
      - monitor-server

volumes:
  postgres_data:
